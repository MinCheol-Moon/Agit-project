# Netlify continuous deployment: once the site is linked to this GitHub repo,
# every push to main rebuilds and redeploys automatically - no manual export
# or drag-and-drop needed.
[build]
  command = "npx expo export --platform web && node scripts/postexport-web.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # EXPO_PUBLIC_* values are compiled into the client bundle anyway; the anon
  # key is the public key Supabase's security model expects to ship publicly
  # (RLS is the real access boundary), so it lives here rather than in a
  # gitignored .env that Netlify's builders can't see.
  EXPO_PUBLIC_SUPABASE_URL = "https://hweqzqdipwtawydtekkl.supabase.co"
  EXPO_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3ZXF6cWRpcHd0YXd5ZHRla2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjIyNjEsImV4cCI6MjA5MjEzODI2MX0.5S-mztcNgIWmhmosPaQroWUH0ED8oLwZTSsBjeZgwTg"

# React Navigation is a single-page app with no server routes, so any path
# should serve index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never let the HTML entry point be cached: it references the hashed JS bundle,
# so a stale index.html pins a device (especially iOS home-screen web apps) to
# old code even after a "refresh". The hashed assets below stay long-cached.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
